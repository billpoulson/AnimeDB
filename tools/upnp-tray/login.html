<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Segoe UI, sans-serif; padding: 24px; margin: 0; background: #1e1e1e; color: #e0e0e0; box-sizing: border-box; }
    * { box-sizing: border-box; }
    h3 { margin: 0 0 12px 0; font-size: 14px; }
    p { margin: 0 0 16px 0; }
    input { width: 100%; padding: 10px 12px; margin-bottom: 16px; background: #2d2d2d; border: 1px solid #444; color: #e0e0e0; border-radius: 4px; }
    button { padding: 10px 20px; background: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0b5ed7; }
    .error { color: #f87171; font-size: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h3>AnimeDB Login</h3>
  <p style="font-size: 12px; color: #888;">Enter your AnimeDB password to allow the UPnP helper to update the external URL.</p>
  <div id="error" class="error" style="display:none;"></div>
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  <button id="submit">Login</button>
  <script>
    document.getElementById('password').focus();
    document.getElementById('submit').onclick = () => {
      const pw = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      if (!pw) { err.textContent = 'Password required'; err.style.display = 'block'; return; }
      window.loginApi.send(pw);
    };
    document.getElementById('password').onkeydown = (e) => {
      if (e.key === 'Enter') document.getElementById('submit').click();
    };
    window.loginApi.onError((msg) => {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
    });
  </script>
</body>
</html>
